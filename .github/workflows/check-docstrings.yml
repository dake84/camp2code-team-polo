name: Docstring Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-docstrings:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Hier deine Python-Version eintragen

    - name: Interrogate installieren
      run: |
        python -m pip install --upgrade pip
        pip install interrogate

    - name: Docstrings prüfen
      run: |
        echo "=== Starte detaillierte Docstring-Analyse ==="
        # 1. Zeigt die genaue Tabelle aller Dateien an (erlaubt Fehlschlagen ignorieren für den Moment)
        interrogate -v -e basisklassen.py .  || true
        echo "=== Überprüfe Mindestanforderung (90%) ==="
        # 2. Dieser Befehl sorgt dafür, dass die Action fehlschlägt, wenn < 90%
        interrogate --fail-under 90 -v -e basisklassen.py .
